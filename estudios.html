<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estudios</title>
  <link rel="icon" href="multimedia\iconweb.png" />
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="app">
    <!-- COPIA exacta del aside.sidebar -->
    <aside class="sidebar" aria-label="Navegación principal">
      <div class="sidebar__logo">
        <img src="c:\Users\javie\Documents\UNI\2º\Segundo\Bejopa\multimedia\logo.png" alt="Logo" />
      </div>
      <nav class="sidebar__nav" role="navigation" aria-label="Menú principal">
        <ul>
          <li><a href="index.html" class="nav-link" data-key="inicio">Inicio</a></li>
          <li><a href="estudios.html" class="nav-link" data-key="estudios">Estudios</a></li>
          <li><a href="actividades.html" class="nav-link" data-key="actividades">Actividades</a></li>
          <li><a href="sobre-nosotros.html" class="nav-link" data-key="sobre-nosotros">Sobre Nosotros</a></li>
          <li><a href="contacto.html" class="nav-link" data-key="contacto">Contacto</a></li>
        </ul>
      </nav>
      <div class="sidebar__footer">
        <small>© <span id="year"></span> Academia Bejopa</small>
      </div>
    </aside>

    <main class="main-content" id="main" tabindex="-1">
      <header class="page-header">
        <h1>Estudios</h1>
      </header>

      <section class="content-grid">

        <article class="card" data-target="primaria">
          <h2>
            PRIMARIA
            <span class="card-toggle-icon">▼</span>
          </h2>
        </article>

        <article class="card" data-target="eso">
          <h2>
            SECUNDARIA E.S.O
            <span class="card-toggle-icon">▼</span>
          </h2>
        </article>

        <article class="card" data-target="bach">
          <h2>
            BACHILLERATO
            <span class="card-toggle-icon">▼</span>
          </h2>
        </article>

      </section>

      <!-- Contenedor único para el detalle -->
      <section class="estudio-detalle" id="estudio-detalle">
        <!-- Se rellena dinámicamente por JS -->
      </section>

    </main>
  </div>

  <script>
    (function () {
      const links = document.querySelectorAll('.nav-link');
      const path = location.pathname.split('/').pop() || 'index.html';
      links.forEach(a => {
        const href = a.getAttribute('href');
        if (href === path) a.classList.add('active');
      });
      document.getElementById('year').textContent = new Date().getFullYear();
    })();
  </script>
<script>
(function () {
  // Mantener tu código original
  const links = document.querySelectorAll('.nav-link');
  const path = location.pathname.split('/').pop() || 'index.html';
  links.forEach(a => {
    const href = a.getAttribute('href');
    if (href === path) a.classList.add('active');
  });
  document.getElementById('year').textContent = new Date().getFullYear();

  // --- Acordeón exclusivo ---
  const cards = document.querySelectorAll('.card');
  const detalle = document.getElementById('estudio-detalle');
  let abierto = null;

  const contenidos = {
  primaria: {
    img: 'multimedia/cursos/primaria.jpg',
    titulo: 'Educación Primaria',
    texto: 'Acompañamos a los estudiantes en una etapa clave para construir hábitos sólidos, mejorar su comprensión y reforzar las bases académicas que necesitarán en cursos posteriores. Nuestro enfoque es cercano, dinámico y adaptado al ritmo de cada niño.',
    lista: [
      'Refuerzo de lectura y escritura',
      'Comprensión matemática',
      'Ciencias Naturales y Sociales',
      'Técnicas de estudio iniciales',
      'Apoyo personalizado'
    ]
  },
  eso: {
    img: 'multimedia/cursos/ESO.jpg',
    titulo: 'Educación Secundaria (E.S.O.)',
    texto: 'En esta etapa ayudamos a los alumnos a afianzar conocimientos, mejorar su autonomía y superar las asignaturas que más les cuestan. Trabajamos con una metodología clara, práctica y orientada a resultados.',
    lista: [
      'Matemáticas y Física',
      'Lengua y Comentario de Texto',
      'Inglés y apoyo gramatical',
      'Ciencias Sociales',
      'Inglés y francés',
      'Preparación de exámenes'
    ]
  },
  bach: {
    img: 'multimedia/cursos/bachiller.jpg',
    titulo: 'Bachillerato',
    texto: 'Preparamos a los estudiantes para afrontar con éxito los dos cursos más exigentes antes de la universidad. Nuestro apoyo es especializado, riguroso y orientado a mejorar tanto el rendimiento como la confianza.',
    lista: [
      'Economía y Empresa',
      'Historia',
      'Latín',
      'Inglés y francés',
      'Lengua y Filosofía',
      'Preparación para EVAU'
    ]
  }
};


  function cerrarTodo() {
    detalle.classList.remove('open');
    detalle.innerHTML = '';
    cards.forEach(card => card.classList.remove('card-open'));
  }

  cards.forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.target;

      // 🔥 Si clico el mismo que está abierto → cerrar y salir
      if (abierto === id) {
        cerrarTodo();
        abierto = null;
        return;
      }

      // 🔥 Si clico otro → cerrar el anterior y abrir este
      cerrarTodo();

      const data = contenidos[id];
      detalle.innerHTML = `
      <div class="estudio-box">
        <div class="estudio-img">
          <img src="${data.img}" alt="${data.titulo}">
        </div>

        <div class="estudio-content">
          <h3>${data.titulo}</h3>
          <p>${data.texto}</p>

          <ul class="estudio-list">
            ${data.lista.map(item => `<li>✔ ${item}</li>`).join('')}
          </ul>
        </div>
      </div>
      `;

      detalle.classList.add('open');
      card.classList.add('card-open');

      // Actualizar estado
      abierto = id;

      // Scroll suave
      detalle.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
})();
</script>
</body>
</html>
